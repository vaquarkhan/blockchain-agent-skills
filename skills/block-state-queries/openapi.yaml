  "paths": {
    "/queryPlan": {
      "post": {
        "operationId": "queryPlan",
        "summary": "Plan a read query with MCP tool mapping",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "properties": {
                  "chain_name": {
                    "type": "string"
                  },
                  "query_type": {
                    "type": "string"
                  }
                },
                "required": [
                  "chain_name",
                  "query_type"
                ]
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Success"
          }
        }
      }
    }
  }
}
