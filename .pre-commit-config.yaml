repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: check-merge-conflict

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.17.2
    hooks:
      - id: markdownlint-cli2
        args: [--config, .markdownlint-cli2.jsonc]

  - repo: local
    hooks:
      - id: validate-skills
        name: validate skills structure and depth
        entry: python scripts/validate-skills.py
        language: system
        pass_filenames: false
      - id: validate-assets
        name: validate asset registry parity
        entry: python scripts/validate-assets.py
        language: system
        pass_filenames: false
      - id: validate-template-schemas
        name: validate MCP and starter-pack schemas
        entry: python scripts/validate-template-schemas.py
        language: system
        pass_filenames: false
      - id: validate-mcp-servers
        name: validate MCP server tool registries
        entry: python scripts/validate-mcp-servers.py
        language: system
        pass_filenames: false
