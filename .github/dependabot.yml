version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-validation:
        patterns:
          - pydantic
          - pyyaml
          - jsonschema

  - package-ecosystem: npm
    directory: /vscode-extension
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: gradle
    directory: /jetbrains-plugin
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
