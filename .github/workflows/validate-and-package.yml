name: Validate and Package

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Python validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-proof.txt

      - name: Validate skill and preset structure
        run: python scripts/validate-skills.py

      - name: Validate asset registry and installer parity
        run: python scripts/validate-assets.py

      - name: Validate MCP and starter-pack schemas
        run: python scripts/validate-template-schemas.py

      - name: Validate MCP server implementations
        run: python scripts/validate-mcp-servers.py

      - name: Sync and validate Bedrock handlers
        run: |
          python scripts/sync_bedrock_artifacts.py
          python scripts/validate-bedrock-handlers.py
          python tests/test_bedrock_handlers.py

      - name: Run chain provider and MCP tests
        run: |
          python tests/test_chain_providers.py
          python tests/test_mcp_servers.py

      - name: Run eval and benchmark checks
        run: |
          python evals/run.py
          python benchmarks/score_benchmarks.py

      - name: Validate local markdown links
        run: python scripts/check-links.py

      - name: Check VS Code extension syntax
        run: node --check extension.js
        working-directory: vscode-extension

      - name: Package VS Code extension
        run: npx @vscode/vsce package --out blockchain-agent-skills-ci.vsix
        working-directory: vscode-extension

      - name: Build JetBrains plugin
        run: |
          chmod +x gradlew
          ./gradlew buildPlugin
        working-directory: jetbrains-plugin

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blockchain-agent-skills-artifacts
          path: |
            vscode-extension/blockchain-agent-skills-ci.vsix
            jetbrains-plugin/build/distributions/*.zip
