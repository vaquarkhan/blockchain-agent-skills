name: validate-and-package
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scripts/validate-skills.py
      - run: python tests/test_chain_providers.py

  package-vscode:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g @vscode/vsce
      - working-directory: vscode-extension
        run: vsce package --no-dependencies
      - uses: actions/upload-artifact@v4
        with:
          name: vscode-vsix
          path: vscode-extension/*.vsix

  package-jetbrains:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - working-directory: jetbrains-plugin
        run: |
          chmod +x gradlew 2>/dev/null || true
          if [ -f gradlew ]; then ./gradlew buildPlugin; else echo "Gradle wrapper not present — skip build"; fi
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: jetbrains-plugin
          path: jetbrains-plugin/build/distributions/*.zip
          if-no-files-found: ignore
