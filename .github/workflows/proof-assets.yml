name: Proof Assets

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  proof-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install proof dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AWS lakehouse example smoke test
        run: |
          python examples/aws-s3-glue-athena-iceberg/jobs/normalize_customers.py --input examples/aws-s3-glue-athena-iceberg/data/customers.jsonl --output examples/aws-s3-glue-athena-iceberg/build/customers.ndjson
          python scripts/validate_dataset_contract.py --contract examples/aws-s3-glue-athena-iceberg/contracts/customers-contract.yaml --data examples/aws-s3-glue-athena-iceberg/build/customers.ndjson --reference-time 2026-05-02T00:00:00Z
          python examples/aws-s3-glue-athena-iceberg/jobs/reconcile_customers.py --source examples/aws-s3-glue-athena-iceberg/data/customers.jsonl --normalized examples/aws-s3-glue-athena-iceberg/build/customers.ndjson

      - name: Run dbt warehouse example smoke test
        run: |
          cd examples/dbt-warehouse-marts
          python -c "from pathlib import Path; Path('build').mkdir(exist_ok=True)"
          dbt seed --project-dir . --profiles-dir profiles
          dbt run --project-dir . --profiles-dir profiles
          dbt test --project-dir . --profiles-dir profiles
          python ../../scripts/validate_dataset_contract.py --contract contracts/fct_daily_revenue-contract.yaml --duckdb build/dbt_warehouse_marts.duckdb --query "select * from fct_daily_revenue order by order_date"

      - name: Run Databricks medallion example smoke test
        run: |
          python examples/databricks-delta-medallion/src/bronze_to_silver.py --input examples/databricks-delta-medallion/sample/bronze.jsonl --output examples/databricks-delta-medallion/build/silver.jsonl
          python scripts/validate_dataset_contract.py --contract examples/databricks-delta-medallion/contracts/silver-contract.yaml --previous-contract examples/databricks-delta-medallion/contracts/silver-contract-v1.yaml --data examples/databricks-delta-medallion/build/silver.jsonl --reference-time 2026-05-02T00:00:00Z
          python examples/databricks-delta-medallion/src/validate_silver.py --silver examples/databricks-delta-medallion/build/silver.jsonl
          python examples/databricks-delta-medallion/src/rollback_silver.py --snapshot examples/databricks-delta-medallion/snapshots/silver_previous.jsonl --output examples/databricks-delta-medallion/build/silver.jsonl
          python examples/databricks-delta-medallion/src/validate_rollback.py --silver examples/databricks-delta-medallion/build/silver.jsonl

      - name: Run streaming harness smoke test
        run: |
          python examples/kafka-flink-streaming/src/producer.py --input examples/kafka-flink-streaming/sample/order-events.jsonl --topic-log examples/kafka-flink-streaming/build/topic/order-events.jsonl --reset
          python examples/kafka-flink-streaming/src/stream_job.py --input examples/kafka-flink-streaming/build/topic/order-events.jsonl --output examples/kafka-flink-streaming/build/sink/windowed-orders.jsonl --checkpoint-output examples/kafka-flink-streaming/build/checkpoints/state.json
          python scripts/validate_dataset_contract.py --contract examples/kafka-flink-streaming/contracts/windowed-orders-contract.yaml --data examples/kafka-flink-streaming/build/sink/windowed-orders.jsonl
          python examples/kafka-flink-streaming/src/validate_sink.py --sink examples/kafka-flink-streaming/build/sink/windowed-orders.jsonl --checkpoint examples/kafka-flink-streaming/build/checkpoints/state.json
          python examples/kafka-flink-streaming/src/replay.py --input examples/kafka-flink-streaming/sample/order-events.jsonl --topic-log examples/kafka-flink-streaming/build/topic/order-events.jsonl
          python examples/kafka-flink-streaming/src/stream_job.py --input examples/kafka-flink-streaming/build/topic/order-events.jsonl --output examples/kafka-flink-streaming/build/sink/windowed-orders.jsonl --checkpoint-output examples/kafka-flink-streaming/build/checkpoints/state.json
          python examples/kafka-flink-streaming/src/validate_sink.py --sink examples/kafka-flink-streaming/build/sink/windowed-orders.jsonl --checkpoint examples/kafka-flink-streaming/build/checkpoints/state.json

      - name: Run serverless Spark MSK reliability smoke test
        run: |
          python examples/aws-serverless-spark-msk-reliability/jobs/checkpoint_batch_job.py --input examples/aws-serverless-spark-msk-reliability/data/order-events.jsonl --workdir examples/aws-serverless-spark-msk-reliability/build/full --run-id run-full
          python scripts/validate_dataset_contract.py --contract examples/aws-serverless-spark-msk-reliability/contracts/aggregated-events-contract.yaml --data examples/aws-serverless-spark-msk-reliability/build/full/publish/aggregated-events.jsonl
          python examples/aws-serverless-spark-msk-reliability/jobs/validate_resume.py --input examples/aws-serverless-spark-msk-reliability/data/order-events.jsonl --workdir examples/aws-serverless-spark-msk-reliability/build --run-id run-resume --fail-after-partitions 1

      - name: Run validator unit tests
        run: python -m unittest discover -s tests -v
