name: Agent Benchmarks

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  agent-benchmarks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run benchmark and eval score checks
        run: |
          python benchmarks/score_benchmarks.py
          python evals/run.py
